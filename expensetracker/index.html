<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Expense Tracker</h1>
            <p class="subtitle">Manage your finances with style</p>
        </header>

        <main>
            <section class="balance-card glass-card">
                <h2>Your Balance</h2>
                <h1 id="balance">₹0.00</h1>
                
                <div class="inc-exp-container">
                    <div>
                        <h4><i class="fas fa-arrow-up"></i> Income</h4>
                        <p id="money-plus" class="money plus">+₹0.00</p>
                    </div>
                    <div class="divider"></div>
                    <div>
                        <h4><i class="fas fa-arrow-down"></i> Expense</h4>
                        <p id="money-minus" class="money minus">-₹0.00</p>
                    </div>
                </div>
            </section>

            <section class="chart-section glass-card">
                <h3>Spending Overview</h3>
                <div class="chart-container" style="position: relative; height:200px; width:100%; display: flex; justify-content: center;">
                    <canvas id="expense-chart"></canvas>
                </div>
            </section>

            <section class="transactions-section glass-card">
                <div class="history-header">
                    <h3>History</h3>
                    <button id="view-all-btn" class="btn-small">View All</button>
                </div>
                <ul id="list" class="list">
                    <!-- Transactions will be added here -->
                </ul>
            </section>

            <section class="add-transaction-section glass-card">
                <h3>Add new transaction</h3>
                <form id="form">
                    <div class="form-control">
                        <label for="text">Description</label>
                        <input type="text" id="text" placeholder="Enter description..." required autocomplete="off" />
                    </div>
                    <div class="form-control">
                        <label for="category">Category</label>
                        <select id="category" class="category-select" required>
                            <option value="General" selected>General</option>
                            <option value="🍔 Food">🍔 Food</option>
                            <option value="🚕 Transport">🚕 Transport</option>
                            <option value="🛍 Shopping">🛍 Shopping</option>
                            <option value="🎮 Entertainment">🎮 Entertainment</option>
                            <option value="🏠 Rent/Bills">🏠 Rent/Bills</option>
                            <option value="💼 Income">💼 Income (if positive)</option>
                        </select>
                    </div>
                    <div class="form-control">
                        <label for="amount">Amount <br>
                            <small>(negative - expense, positive - income)</small>
                        </label>
                        <input type="number" id="amount" placeholder="Enter amount..." required step="0.01" />
                    </div>
                    <button class="btn" type="submit">Add Transaction</button>
                </form>
            </section>
        </main>
    </div>

    <div id="history-modal" class="modal-container">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>Full Transaction History</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="table-container">
                <table id="history-table" class="history-table">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <!-- Table rows generated by JS -->
                    </tbody>
                </table>
            </div>
            <button id="export-csv-btn" class="btn btn-outline" style="margin-top: 15px;">Export to CSV</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
